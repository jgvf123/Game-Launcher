name: Build Android APK

# Builds an installable Android APK for Neon Snake 3D.
# Runs on GitHub's runners (which can reach Google's Android servers),
# then uploads the APK as a downloadable artifact and a GitHub Release.

on:
  push:
    branches: ["**"]
    paths:
      - "www/**"
      - "capacitor.config.json"
      - "package.json"
      - ".github/workflows/build-apk.yml"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Add Android platform (Capacitor)
        run: |
          npx --yes cap add android || npx --yes cap sync android
          npx --yes cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Locate APK
        id: apk
        run: |
          APK=$(find android -name "*-debug.apk" | head -n1)
          echo "Found APK: $APK"
          cp "$APK" neon-snake-3d-debug.apk
          echo "path=neon-snake-3d-debug.apk" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: neon-snake-3d-apk
          path: neon-snake-3d-debug.apk
          if-no-files-found: error

      - name: Publish APK to a Release
        if: github.ref == 'refs/heads/main' || github.ref_name == 'claude/3d-snake-game-levels-4sesmo'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.run_number }}
          name: Neon Snake 3D APK (build ${{ github.run_number }})
          body: |
            Installable Android APK for **Neon Snake 3D**.
            Download `neon-snake-3d-debug.apk` below, copy it to your phone, and tap to install
            (enable "Install unknown apps" for your browser/file manager if prompted).
          files: neon-snake-3d-debug.apk
          fail_on_unmatched_files: false
